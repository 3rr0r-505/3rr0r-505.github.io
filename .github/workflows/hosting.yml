name: 🌐 Hosting Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 19 * * *'  # 01:00 AM IST = 19:30 UTC

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: 🔍 Check All Endpoints
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check endpoints
        id: check
        run: |
          check_url() {
            curl -o /dev/null -s -w "%{http_code}" -L --max-time 10 "$1"
          }

          all_up=true
          report=""

          # Cloudflare pair
          cf_direct=$(check_url "https://3rr0r-505-github-io.pages.dev")
          cf_domain=$(check_url "https://5pyd3r.is-a.dev")

          if [ "$cf_direct" -eq 200 ] && [ "$cf_domain" -eq 200 ]; then
            report+="- ✅ Cloudflare — UP (pages.dev: $cf_direct, is-a.dev: $cf_domain)\n"
          elif [ "$cf_direct" -eq 200 ] && [ "$cf_domain" -ne 200 ]; then
            report+="- ⚠️ Cloudflare — HOST UP, DNS ISSUE (pages.dev: $cf_direct, is-a.dev: $cf_domain)\n"
            all_up=false
          else
            report+="- ❌ Cloudflare — DOWN (pages.dev: $cf_direct, is-a.dev: $cf_domain)\n"
            all_up=false
          fi

          # GitHub pair
          gh_direct=$(check_url "https://3rr0r-505.github.io")
          gh_domain=$(check_url "https://5pyd3rr.is-a.dev")

          if [ "$gh_direct" -eq 200 ] && [ "$gh_domain" -eq 200 ]; then
            report+="- ✅ GitHub Pages — UP (github.io: $gh_direct, is-a.dev: $gh_domain)\n"
          elif [ "$gh_direct" -eq 200 ] && [ "$gh_domain" -ne 200 ]; then
            report+="- ⚠️ GitHub Pages — HOST UP, DNS ISSUE (github.io: $gh_direct, is-a.dev: $gh_domain)\n"
            all_up=false
          else
            report+="- ❌ GitHub Pages — DOWN (github.io: $gh_direct, is-a.dev: $gh_domain)\n"
            all_up=false
          fi

          echo "all_up=$all_up" >> $GITHUB_OUTPUT
          echo -e "$report" >> $GITHUB_STEP_SUMMARY
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$report" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: All systems up
        if: steps.check.outputs.all_up == 'true'
        run: |
          echo "## ✅ All endpoints are up" >> $GITHUB_STEP_SUMMARY

      - name: Create issue if any down
        if: steps.check.outputs.all_up == 'false'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
            REPORT: ${{ steps.check.outputs.report }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Hosting Health Check Failed',
              body: `## Hosting Health Check Failed\n\n${process.env.REPORT}\n\n> Auto-generated by hosting health check workflow.\n> Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['hosting', 'incident']
            });
          
