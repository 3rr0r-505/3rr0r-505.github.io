name: 🌐 Hosting Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 19 * * *'  # 01:00 AM IST = 19:30 UTC

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: 🔍 Check All Endpoints
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Check endpoints
        id: check
        run: |
          declare -A sites
          sites["5pyd3r.is-a.dev"]="https://5pyd3r.is-a.dev"
          sites["5pyd3rr.is-a.dev"]="https://5pyd3rr.is-a.dev"
          sites["3rr0r-505-github-io.pages.dev"]="https://3rr0r-505-github-io.pages.dev"
          sites["3rr0r-505.github.io"]="https://3rr0r-505.github.io"

          all_up=true
          report=""

          for name in "${!sites[@]}"; do
            url="${sites[$name]}"
            status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$url")
            if [ "$status" -eq 200 ]; then
              report+="- ✅ \`$name\` — UP ($status)\n"
            else
              report+="- ❌ \`$name\` — DOWN ($status)\n"
              all_up=false
            fi
          done

          echo "all_up=$all_up" >> $GITHUB_OUTPUT
          echo -e "$report" >> $GITHUB_STEP_SUMMARY
          echo "report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$report" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: All systems up
        if: steps.check.outputs.all_up == 'true'
        run: |
          echo "## ✅ All endpoints are up" >> $GITHUB_STEP_SUMMARY

      - name: Create issue if any down
        if: steps.check.outputs.all_up == 'false'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        env:
            REPORT: ${{ steps.check.outputs.report }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Hosting Health Check Failed',
              body: `## Hosting Health Check Failed\n\n${process.env.REPORT}\n\n> Auto-generated by hosting health check workflow.\n> Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['hosting', 'incident']
            });
          
