name: 🔔 Domain Renewal Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC = 14:30 IST daily

env:
  RENEWAL_DATE: "2027-03-19"
  DOMAIN: "5pyd3r.org"

permissions:
  contents: read
  issues: write

jobs:
  renewal-reminder:
    name: 📅 Check Domain Expiry
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Calculate days remaining
        id: calc
        run: |
          today=$(date +%Y-%m-%d)
          expiry="${{ env.RENEWAL_DATE }}"
          days_left=$(( ($(date -d "$expiry" +%s) - $(date -d "$today" +%s)) / 86400 ))
          echo "days_left=$days_left" >> $GITHUB_OUTPUT
          echo "Days remaining: $days_left"

      - name: Manual dispatch — status issue
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DAYS_LEFT: ${{ steps.calc.outputs.days_left }}
        with:
          script: |
            const days = parseInt(process.env.DAYS_LEFT);
            const expiry = process.env.RENEWAL_DATE || '2027-03-21';
            const domain = process.env.DOMAIN || '5pyd3r.org';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔔 Domain Status Check — ${days} days remaining`,
              body: `## 🔔 Domain Renewal Reminder\n\n**Days remaining:** ${days} days\n\n---\n\n### 📋 Domain Details\n\n| Field | Info |\n|-------|------|\n| Domain | \`${domain}\` |\n| Expiry | ${expiry} |\n| Registrar | [Porkbun](https://porkbun.com/account/domainsSpeedy) |\n| Login | \`*****.career+dev@gmail.com\` |\n\n### 🔧 Management\n\n- 🐷 [Login to Porkbun](https://porkbun.com/account/domainsSpeedy) — renewal, WHOIS, nameservers\n- ☁️ [Cloudflare Dashboard](https://dash.cloudflare.com) — DNS, SSL, security\n\n### ℹ️ Action Required\nRenew \`${domain}\` before **${expiry}** to avoid service interruption.\n\n> Manually triggered status check.`,
              labels: ['domain', 'reminder', 'info'],
              assignees: ['3rr0r-505']
            });

      - name: 30 day reminder
        if: github.event_name == 'schedule' && steps.calc.outputs.days_left == '30'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DAYS_LEFT: ${{ steps.calc.outputs.days_left }}
        with:
          script: |
            const expiry = '2027-03-21';
            const domain = '5pyd3r.org';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Domain Renewal — 30 days remaining`,
              body: `## 🔔 Domain Renewal Reminder\n\n**Days remaining:** 30 days\n\n---\n\n### 📋 Domain Details\n\n| Field | Info |\n|-------|------|\n| Domain | \`${domain}\` |\n| Expiry | ${expiry} |\n| Registrar | [Porkbun](https://porkbun.com/account/domainsSpeedy) |\n| Login | \`*****.career+dev@gmail.com\` |\n\n### 🔧 Management\n\n- 🐷 [Login to Porkbun](https://porkbun.com/account/domainsSpeedy) — renewal, WHOIS, nameservers\n- ☁️ [Cloudflare Dashboard](https://dash.cloudflare.com) — DNS, SSL, security\n\n### ⚠️ Action Required\nRenew \`${domain}\` before **${expiry}** to avoid service interruption.\n\n> Auto-generated by domain renewal reminder workflow.`,
              labels: ['domain', 'reminder'],
              assignees: ['3rr0r-505']
            });

      - name: 15 day reminder
        if: github.event_name == 'schedule' && steps.calc.outputs.days_left == '15'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const expiry = '2027-03-21';
            const domain = '5pyd3r.org';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Domain Renewal — 15 days remaining`,
              body: `## 🔔 Domain Renewal Reminder\n\n**Days remaining:** 15 days\n\n---\n\n### 📋 Domain Details\n\n| Field | Info |\n|-------|------|\n| Domain | \`${domain}\` |\n| Expiry | ${expiry} |\n| Registrar | [Porkbun](https://porkbun.com/account/domainsSpeedy) |\n| Login | \`*****.career+dev@gmail.com\` |\n\n### 🔧 Management\n\n- 🐷 [Login to Porkbun](https://porkbun.com/account/domainsSpeedy) — renewal, WHOIS, nameservers\n- ☁️ [Cloudflare Dashboard](https://dash.cloudflare.com) — DNS, SSL, security\n\n### ⚠️ Action Required\nRenew \`${domain}\` before **${expiry}** to avoid service interruption.\n\n> Auto-generated by domain renewal reminder workflow.`,
              labels: ['domain', 'reminder', 'urgent'],
              assignees: ['3rr0r-505']
            });

      - name: 7 day reminder
        if: github.event_name == 'schedule' && steps.calc.outputs.days_left == '7'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const expiry = '2027-03-21';
            const domain = '5pyd3r.org';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Domain Renewal — 7 days remaining`,
              body: `## 🔔 Domain Renewal Reminder\n\n**Days remaining:** 7 days\n\n---\n\n### 📋 Domain Details\n\n| Field | Info |\n|-------|------|\n| Domain | \`${domain}\` |\n| Expiry | ${expiry} |\n| Registrar | [Porkbun](https://porkbun.com/account/domainsSpeedy) |\n| Login | \`*****.career+dev@gmail.com\` |\n\n### 🔧 Management\n\n- 🐷 [Login to Porkbun](https://porkbun.com/account/domainsSpeedy) — renewal, WHOIS, nameservers\n- ☁️ [Cloudflare Dashboard](https://dash.cloudflare.com) — DNS, SSL, security\n\n### 🚨 Action Required\nRenew \`${domain}\` before **${expiry}** to avoid service interruption.\n\n> Auto-generated by domain renewal reminder workflow.`,
              labels: ['domain', 'reminder', 'urgent'],
              assignees: ['3rr0r-505']
            });

      - name: 3 day reminder
        if: github.event_name == 'schedule' && steps.calc.outputs.days_left == '3'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const expiry = '2027-03-21';
            const domain = '5pyd3r.org';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 URGENT — Domain expires in 3 days`,
              body: `## 🔔 Domain Renewal Reminder\n\n**Days remaining:** 3 days\n\n---\n\n### 📋 Domain Details\n\n| Field | Info |\n|-------|------|\n| Domain | \`${domain}\` |\n| Expiry | ${expiry} |\n| Registrar | [Porkbun](https://porkbun.com/account/domainsSpeedy) |\n| Login | \`*****.career+dev@gmail.com\` |\n\n### 🔧 Management\n\n- 🐷 [Login to Porkbun](https://porkbun.com/account/domainsSpeedy) — renewal, WHOIS, nameservers\n- ☁️ [Cloudflare Dashboard](https://dash.cloudflare.com) — DNS, SSL, security\n\n### 🚨 URGENT\nRenew \`${domain}\` before **${expiry}** immediately to avoid service interruption.\n\n> Auto-generated by domain renewal reminder workflow.`,
              labels: ['domain', 'reminder', 'urgent'],
              assignees: ['3rr0r-505']
            });

      - name: No action needed
        if: github.event_name == 'schedule' && steps.calc.outputs.days_left != '30' && steps.calc.outputs.days_left != '15' && steps.calc.outputs.days_left != '7' && steps.calc.outputs.days_left != '3'
        run: echo "✅ No reminder needed. ${{ steps.calc.outputs.days_left }} days until renewal."
