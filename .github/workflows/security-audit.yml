name: 🛡️ Passive Security & Integrity Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * 6'  # Every Saturday at 1AM UTC
  workflow_dispatch:      # Manual trigger from Actions tab

permissions:
  contents: read
  issues: write           # Needed to open issues on critical findings

jobs:

  # ══════════════════════════════════════════════
  # JOB 1 — Secret & Credential Scan (TruffleHog)
  # ══════════════════════════════════════════════
  secret-scan:
    name: 🔑 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # Full history for trufflehog

      - name: Run TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified
        continue-on-error: true

      - name: Generate secret scan report
        if: always()
        run: |
          echo "# 🔑 Secret Scan Report" > secret-report.md
          echo "**Run:** $(date -u)" >> secret-report.md
          echo "**Trigger:** ${{ github.event_name }}" >> secret-report.md
          echo "**Commit:** ${{ github.sha }}" >> secret-report.md
          echo "" >> secret-report.md
          if [ "${{ steps.trufflehog.outcome }}" == "success" ]; then
            echo "## ✅ Status: CLEAN" >> secret-report.md
            echo "No verified secrets or credentials found in codebase." >> secret-report.md
          else
            echo "## ⚠️ Status: FINDINGS DETECTED" >> secret-report.md
            echo "TruffleHog detected potential secrets. Review Actions log for details." >> secret-report.md
          fi

      - name: Post summary
        if: always()
        run: cat secret-report.md >> $GITHUB_STEP_SUMMARY
      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: secret-scan-report
          path: secret-report.md
          retention-days: 30

      - name: Open issue on critical finding
        if: steps.trufflehog.outcome == 'failure'
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const title = `🔑 [SECURITY] Secret/Credential Detected — ${new Date().toISOString().split('T')[0]}`;
            const body = `## Secret Scan Alert\n\n**TruffleHog detected a potential verified secret in the codebase.**\n\n- **Commit:** \`${{ github.sha }}\`\n- **Branch:** \`${{ github.ref_name }}\`\n- **Triggered by:** ${{ github.event_name }}\n\n### Action Required\n1. Check the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details\n2. Rotate any exposed credentials immediately\n3. Remove the secret from git history\n\n> This issue was auto-generated by the passive security audit workflow.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'critical']
            });

  # ══════════════════════════════════════════════
  # JOB 2 — Static Code Analysis (Semgrep)
  # ══════════════════════════════════════════════
  code-analysis:
    name: 🔍 Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Install semgrep
        run: pip install semgrep

      - name: Run semgrep on JS and HTML
        id: semgrep
        run: |
          semgrep \
            --config "p/javascript" \
            --config "p/html" \
            --config "p/xss" \
            --config "p/secrets" \
            --json \
            --output semgrep-results.json \
            --include="*.js" \
            --include="*.html" \
            . || true

      - name: Generate semgrep report
        if: always()
        run: |
          python3 << 'EOF'
          import json, os

          report = ["# 🔍 Static Code Analysis Report"]
          report.append(f"**Run:** $(date -u)")
          report.append("")

          try:
              with open("semgrep-results.json") as f:
                  data = json.load(f)
              results = data.get("results", [])
              errors  = data.get("errors", [])

              if not results:
                  report.append("## ✅ Status: CLEAN")
                  report.append("No issues found by semgrep.")
              else:
                  # Group by severity
                  high   = [r for r in results if r.get("extra", {}).get("severity") == "ERROR"]
                  medium = [r for r in results if r.get("extra", {}).get("severity") == "WARNING"]
                  info   = [r for r in results if r.get("extra", {}).get("severity") == "INFO"]

                  report.append(f"## ⚠️ Status: {len(results)} Finding(s)")
                  report.append(f"- 🔴 High: {len(high)}")
                  report.append(f"- 🟡 Medium: {len(medium)}")
                  report.append(f"- 🔵 Info: {len(info)}")
                  report.append("")
                  report.append("## Findings")

                  for r in results:
                      path     = r.get("path", "unknown")
                      line     = r.get("start", {}).get("line", "?")
                      rule     = r.get("check_id", "unknown")
                      message  = r.get("extra", {}).get("message", "")
                      severity = r.get("extra", {}).get("severity", "INFO")
                      report.append(f"\n### `{path}:{line}`")
                      report.append(f"- **Rule:** `{rule}`")
                      report.append(f"- **Severity:** {severity}")
                      report.append(f"- **Message:** {message}")

          except Exception as e:
              report.append(f"## ❌ Error parsing results: {e}")

          with open("semgrep-report.md", "w") as f:
              f.write("\n".join(report))
          print("Report generated.")
          EOF

      - name: Post summary
        if: always()
        run: cat semgrep-report.md >> $GITHUB_STEP_SUMMARY
      - name: Upload semgrep report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: code-analysis-report
          path: |
            semgrep-report.md
            semgrep-results.json
          retention-days: 30

      - name: Open issue on high severity findings
        if: always()
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync('semgrep-results.json', 'utf8'));
              const high = (data.results || []).filter(r => r?.extra?.severity === 'ERROR');
              if (high.length === 0) return;
              const findings = high.map(r =>
                `- \`${r.path}:${r.start?.line}\` — ${r.check_id}\n  ${r.extra?.message || ''}`
              ).join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔍 [SECURITY] High Severity Code Issues — ${new Date().toISOString().split('T')[0]}`,
                body: `## Static Analysis Alert\n\n**Semgrep found ${high.length} high severity issue(s).**\n\n### Findings\n${findings}\n\n- **Commit:** \`${{ github.sha }}\`\n- **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n> Auto-generated by passive security audit.`,
                labels: ['security', 'bug']
              });
            } catch(e) { console.log('No high findings or parse error:', e.message); }

  # ══════════════════════════════════════════════
  # JOB 3 — Broken Link Checker (Lychee)
  # ══════════════════════════════════════════════
  link-check:
    name: 🔗 Broken Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Run Lychee link checker
        id: lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: |
            --verbose
            --no-progress
            --accept 200,201,202,203,204,206,301,302,307,308,429
            --timeout 20
            --exclude "^mailto:"
            --exclude "^javascript:"
            --exclude "localhost"
            --exclude "127.0.0.1"
            --exclude "linkedin.com"
            --exclude "tryhackme.com"
            --exclude "fonts.googleapis.com"
            --exclude "fonts.gstatic.com"
            --format markdown
            ./blog/index.html
            ./blog/posts/index.html
            ./index.html
          fail: true
          output: lychee-report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enrich lychee report
        if: always()
        run: |
          echo "" >> lychee-report.md
          echo "---" >> lychee-report.md
          echo "**Checked files:** index.html, blog/index.html, blog/posts/index.html" >> lychee-report.md
          echo "**Run date:** $(date -u)" >> lychee-report.md
          echo "**Commit:** ${{ github.sha }}" >> lychee-report.md

      - name: Upload link check report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: link-check-report
          path: lychee-report.md
          retention-days: 30

      - name: Open issue on broken links
        if: steps.lychee.outcome == 'failure'
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('lychee-report.md')
              ? fs.readFileSync('lychee-report.md', 'utf8').slice(0, 3000)
              : 'See Actions run for details.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔗 [INTEGRITY] Broken Links Detected — ${new Date().toISOString().split('T')[0]}`,
              body: `## Broken Link Alert\n\nLychee detected broken or dead links in your site.\n\n### Report Summary\n${report}\n\n- **Commit:** \`${{ github.sha }}\`\n- **Full report:** [Actions Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n> Auto-generated by passive security audit.`,
              labels: ['integrity', 'bug']
            });

  # ══════════════════════════════════════════════
  # JOB 4 — posts.json Integrity Check
  # ══════════════════════════════════════════════
  posts-integrity:
    name: 📋 Blog Posts Integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6.0.2

      - name: Check posts.json integrity
        id: integrity
        run: |
          python3 << 'EOF'
          import json, os, sys

          report   = ["# 📋 Blog Posts Integrity Report"]
          report.append(f"**Checked:** blog/posts.json")
          report.append("")

          errors   = []
          warnings = []

          # Load posts.json
          try:
              with open("blog/posts.json") as f:
                  posts = json.load(f)
          except FileNotFoundError:
              report.append("## ❌ CRITICAL: blog/posts.json not found")
              report.append("Run `python blog-manager.py` and commit the result.")
              print("\n".join(report))
              with open("integrity-report.md", "w") as f: f.write("\n".join(report))
              sys.exit(1)
          except json.JSONDecodeError as e:
              report.append(f"## ❌ CRITICAL: posts.json is invalid JSON — {e}")
              with open("integrity-report.md", "w") as f: f.write("\n".join(report))
              sys.exit(1)

          report.append(f"**Total posts:** {len(posts)}")
          report.append("")
          report.append("## File Existence Check")

          all_ok = True
          for post in posts:
              path  = post.get("path", "")
              title = post.get("title", "unknown")

              # Check required fields
              if not post.get("title"):
                  warnings.append(f"⚠️ Missing title in entry: `{path}`")
              if not post.get("date"):
                  warnings.append(f"⚠️ Missing date in entry: `{path}`")

              # Check file exists
              if not path:
                  errors.append(f"❌ Entry has no path field: `{title}`")
                  all_ok = False
                  continue

              if not os.path.isfile(path):
                  errors.append(f"❌ File not found: `{path}` (post: **{title}**)")
                  all_ok = False
              else:
                  report.append(f"- ✅ `{path}`")

              # Check for folder-based post assets
              if "/" in path:
                  folder = "/".join(path.split("/")[:-1])
                  assets_dir = os.path.join(folder, "assets")
                  if os.path.isdir(assets_dir):
                      asset_count = len(os.listdir(assets_dir))
                      report.append(f"  - 📁 assets/ ({asset_count} file(s))")

          report.append("")

          if errors:
              report.append("## ❌ Errors")
              report.extend(errors)
              all_ok = False

          if warnings:
              report.append("## ⚠️ Warnings")
              report.extend(warnings)

          if all_ok and not warnings:
              report.append("## ✅ Status: ALL GOOD")
              report.append("All posts in posts.json have matching files on disk.")
          elif all_ok:
              report.append("## ✅ Status: PASSED WITH WARNINGS")
          else:
              report.append("## ❌ Status: FAILED")
              report.append("Some posts in posts.json are missing their files.")

          with open("integrity-report.md", "w") as f:
              f.write("\n".join(report))

          print("\n".join(report))

          if not all_ok:
              sys.exit(1)
          EOF
        continue-on-error: true

      - name: Post summary
        if: always()
        run: cat integrity-report.md >> $GITHUB_STEP_SUMMARY
      - name: Upload integrity report
        if: always()
        uses: actions/upload-artifact@v7.0.0
        with:
          name: posts-integrity-report
          path: integrity-report.md
          retention-days: 30

      - name: Open issue on integrity failure
        if: steps.integrity.outcome == 'failure'
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.existsSync('integrity-report.md')
              ? fs.readFileSync('integrity-report.md', 'utf8').slice(0, 3000)
              : 'See Actions run for details.';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 [INTEGRITY] posts.json Has Missing Files — ${new Date().toISOString().split('T')[0]}`,
              body: `## Blog Integrity Alert\n\nOne or more posts listed in \`posts.json\` have no matching file in \`blog/_posts/\`.\n\n### Report\n${report}\n\n- **Commit:** \`${{ github.sha }}\`\n- **Fix:** Run \`python blog-manager.py\` and commit the updated \`posts.json\`\n- **Run:** [Actions](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n> Auto-generated by passive security audit.`,
              labels: ['integrity', 'blog']
            });

  # ══════════════════════════════════════════════
  # JOB 5 — Final Summary
  # ══════════════════════════════════════════════
  audit-summary:
    name: 📊 Audit Summary
    runs-on: ubuntu-latest
    needs: [secret-scan, code-analysis, link-check, posts-integrity]
    if: always()
    steps:
      - name: Generate summary
        uses: actions/github-script@v8.0.0
        with:
          script: |
            const jobs = {
              'Secret Scan':       '${{ needs.secret-scan.result }}',
              'Code Analysis':     '${{ needs.code-analysis.result }}',
              'Link Check':        '${{ needs.link-check.result }}',
              'Posts Integrity':   '${{ needs.posts-integrity.result }}',
            };
            const icon = r => r === 'success' ? '✅' : r === 'failure' ? '❌' : '⚠️';
            const lines = Object.entries(jobs).map(([k,v]) => `| ${icon(v)} ${k} | ${v} |`);
            const summary = [
              '# 🛡️ Security & Integrity Audit Summary',
              '',
              `**Repo:** ${{ github.repository }}`,
              `**Commit:** \`${{ github.sha }}\``,
              `**Date:** ${new Date().toUTCString()}`,
              `**Trigger:** ${{ github.event_name }}`,
              '',
              '| Job | Result |',
              '|-----|--------|',
              ...lines,
              '',
              `[View full run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');
            await core.summary.addRaw(summary).write();