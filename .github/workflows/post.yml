name: 📝 Blog Manifest Sync

on:
  schedule:
    - cron: '0 19 * * *'  # 00:30 AM IST = 19:00 UTC previous day
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-posts:
    name: 🔄 Sync posts.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Run blog-manager.py
        run: python blog-manager.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet blog/posts.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Already in sync
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ posts.json is already in sync — no changes detected."

      - name: Create PR if changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: sync posts.json"
          branch: ci/sync-posts-json
          title: "📝 [BLOG] posts.json out of sync — new post(s) detected"
          body: |
            ## Blog Manifest Sync

            `blog-manager.py` detected new or updated posts not reflected in `posts.json`.

            **Review the changes below and merge to update the blog listing.**

            > Auto-generated by blog manifest sync workflow.
          assignees: 3rr0r-505
          labels: blog manifest sync
          base: main