name: 📝 Blog Manifest Sync

on:
  schedule:
    - cron: '0 19 * * *'  # 00:30 AM IST = 19:00 UTC previous day
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-posts:
    name: 🔄 Sync posts.json
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Run blog-manager.py
        run: python blog-manager.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet blog/posts.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Already in sync
        if: steps.diff.outputs.changed == 'false'
        run: echo "✅ posts.json is already in sync — no changes detected."

      - name: Create PR if changed
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "ci: sync posts.json"
          branch: ci/sync-posts-json
          title: "📝 [BLOG] posts.json out of sync — new post(s) detected"
          body: |
            ## Blog Manifest Sync

            `blog-manager.py` detected new or updated posts not reflected in `posts.json`.

            **Review the changes below and merge to update the blog listing.**

            > Auto-generated by blog manifest sync workflow.
          assignees: 3rr0r-505
          labels: blog manifest sync
          base: main